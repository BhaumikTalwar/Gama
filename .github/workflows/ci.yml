name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Install sqlc
        uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: '1.30.0'

      - name: Install make
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential

      - name: Generate sqlc code
        run: make sqlc

      - name: Build
        run: make build

      - name: Unit tests
        run: go test -short -count=1 ./...
