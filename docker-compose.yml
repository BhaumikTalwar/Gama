services:
  postgres:
    image: postgres:18.1
    container_name: local-test-postgres
    restart: unless-stopped
    networks:
      - gama-network
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d devdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql

  redis:
    image: redis:7.4-alpine
    container_name: local-test-redis
    restart: unless-stopped
    networks:
      - gama-network
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: local-test-minio
    restart: unless-stopped
    networks:
      - gama-network
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - miniodata:/data

  tempo:
    image: grafana/tempo:latest
    container_name: local-test-tempo
    restart: unless-stopped
    networks:
      - gama-network
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "3200:3200"   # Tempo HTTP
    volumes:
      - ./docker/tempo.yaml:/etc/tempo.yaml

  prometheus:
    image: prom/prometheus:latest
    container_name: local-test-prometheus
    restart: unless-stopped
    networks:
      - gama-network
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    container_name: local-test-grafana
    restart: unless-stopped
    networks:
      - gama-network
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./docker/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo

  gama:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gama-app
    restart: unless-stopped
    networks:
      - gama-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - APP_DATABASE=postgres
      - APP_POSTGRES_HOST=postgres
      - APP_POSTGRES_PORT=5432
      - APP_POSTGRES_USER=devuser
      - APP_POSTGRES_PASSWORD=devpass
      - APP_POSTGRES_DATABASE=devdb
      - APP_POSTGRES_SSL_MODE=disable
      - APP_POSTGRES_URI=postgres://devuser:devpass@postgres:5432/devdb?sslmode=disable
      - APP_REDIS_HOST=redis
      - APP_REDIS_PORT=6379
      - APP_S3_ENDPOINT=http://minio:9000
      - APP_S3_REGION=us-east-1
      - APP_S3_PUBLIC_BUCKET=gama-public
      - APP_S3_PRIVATE_BUCKET=gama-private
      - APP_S3_ACCESS_KEY=minioadmin
      - APP_S3_SECRET_KEY=minioadmin
      - APP_S3_PUBLIC_BASE_URL=http://localhost:9000/gama-public
      - APP_TELEMETRY_ENABLED=true
      - APP_TELEMETRY_OTLP_ENDPOINT=tempo:4317
    volumes:
      - ./.env:/app/.env
      - ./config.yaml:/app/config.yaml

networks:
  gama-network:
    driver: bridge

volumes:
  pgdata:
  miniodata:
  promdata:
  grafana-data:
